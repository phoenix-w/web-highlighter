<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Web Highlighter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="options.css" />
  <link id="favicon" rel="icon" type="image/png" href="../icons/options/yellow_128.png" />
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <h1 class="sidebar-title">Web Highlighter</h1>
      <ul class="nav-list">
        <li class="nav-item active" data-tab="settings">Settings</li>
        <li class="nav-item" data-tab="highlights">Saved Highlights</li>
      </ul>
      <div class="sidebar-bottom">
        <button id="theme-toggle" class="theme-btn" title="Theme: System">
          <span class="theme-icon-system">&#9684;</span>
          <span class="theme-icon-dark">&#9790;</span>
          <span class="theme-icon-light">&#9728;</span>
        </button>
      </div>
    </nav>

    <main class="content">
      <!-- Settings Tab -->
      <div id="tab-settings" class="tab-panel active">

        <!-- General -->
        <section>
          <div class="section-header" style="margin-bottom: 20px;">
            <h2>General</h2>
            <div class="button-group">
              <button id="export-settings-btn" class="btn btn-small">Export Settings</button>
              <button id="import-settings-btn" class="btn btn-small">Import Settings</button>
            </div>
            <input type="file" id="import-settings-file" accept=".json" hidden />
          </div>
          <div class="settings-list">
            <div class="setting-row">
              <span class="setting-label">Extension Icon</span>
              <div id="icon-picker" class="icon-picker"></div>
            </div>
            <div class="setting-row">
              <span class="setting-label">Color Toolbar</span>
              <label class="toggle-row-inline">
                <span>Show when selecting text</span>
                <input type="checkbox" id="toggle-toolbar" checked />
                <span class="toggle"></span>
              </label>
            </div>
            <div class="setting-row">
              <span class="setting-label">Note Input</span>
              <label class="toggle-row-inline">
                <span>Show in color toolbar when clicking a highlight</span>
                <input type="checkbox" id="toggle-notes" checked />
                <span class="toggle"></span>
              </label>
            </div>
          </div>
        </section>

        <!-- Highlighter Colors -->
        <section>
          <div class="section-header" style="margin-bottom: 20px;">
            <h2>Highlighter Colors</h2>
            <button id="reset-colors-btn" class="btn btn-small btn-danger">Reset to Default</button>
          </div>
          <div class="option-group" style="margin-bottom: 24px;">
            <label>
              <span>Opacity</span>
              <div class="range-row">
                <input type="range" id="opacity" min="15" max="80" value="45" />
                <span id="opacity-value" class="range-label">45%</span>
              </div>
            </label>
            <label>
              <span>Border Radius</span>
              <div class="range-row">
                <input type="range" id="border-radius" min="0" max="8" value="2" />
                <span id="border-radius-value" class="range-label">2px</span>
              </div>
            </label>
          </div>
          <div class="color-columns-header">
            <span class="col-header col-colors">Colors</span>
            <span class="col-header col-light">Light Mode</span>
            <span class="col-header col-dark">Dark Mode</span>
            <span class="col-header col-shortcut">Shortcut</span>
          </div>
          <div id="color-rows"></div>
        </section>
      </div>

      <!-- Highlights Tab -->
      <div id="tab-highlights" class="tab-panel">
        <section>
          <div class="section-header" style="margin-bottom: 20px;">
            <h2>Saved Highlights</h2>
            <button id="clear-all-btn" class="btn btn-small btn-danger">Clear All</button>
          </div>
          <div id="highlights-stats" class="highlights-stats"></div>
          <input type="text" id="highlights-search" class="search-input" placeholder="Search highlights..." />
          <div id="highlights-list"></div>
          <div id="highlights-empty" class="highlights-empty hidden">No highlights saved yet.</div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="options.js"></script>
</body>
</html>
