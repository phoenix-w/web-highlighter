<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Web Highlighter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <h1 class="sidebar-title">Web Highlighter</h1>
      <ul class="nav-list">
        <li class="nav-item active" data-tab="settings">Settings</li>
        <li class="nav-item" data-tab="highlights">Saved Highlights</li>
      </ul>
      <div class="sidebar-bottom">
        <button id="theme-toggle" class="theme-btn" title="Toggle light/dark mode">
          <span class="theme-icon-dark">&#9790;</span>
          <span class="theme-icon-light">&#9728;</span>
        </button>
      </div>
    </nav>

    <main class="content">
      <!-- Settings Tab -->
      <div id="tab-settings" class="tab-panel active">
        <section>
          <div class="section-header" style="margin-bottom: 20px;">
            <h2>Highlighter Colors</h2>
            <button id="reset-colors-btn" class="btn btn-small btn-danger">Reset to Default</button>
          </div>
          <div class="option-group" style="margin-bottom: 24px;">
            <label>
              <span>Opacity</span>
              <div class="range-row">
                <input type="range" id="opacity" min="15" max="80" value="45" />
                <span id="opacity-value" class="range-label">45%</span>
              </div>
            </label>
            <label>
              <span>Border Radius</span>
              <div class="range-row">
                <input type="range" id="border-radius" min="0" max="8" value="2" />
                <span id="border-radius-value" class="range-label">2px</span>
              </div>
            </label>
          </div>
          <div id="color-rows"></div>
        </section>
      </div>

      <!-- Highlights Tab -->
      <div id="tab-highlights" class="tab-panel">
        <section>
          <div class="section-header" style="margin-bottom: 20px;">
            <h2>Saved Highlights</h2>
            <button id="clear-all-btn" class="btn btn-small btn-danger">Clear All</button>
          </div>
          <div id="highlights-stats" class="highlights-stats"></div>
          <div id="highlights-list"></div>
          <div id="highlights-empty" class="highlights-empty hidden">No highlights saved yet.</div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="options.js"></script>
</body>
</html>
